<html>
<head>
    <title>iisnode logs</title>
    <style type="text/css">
        body
        {
            font-family: "Trebuchet MS" , Arial, Helvetica, sans-serif;
        }
        table
        {
            border-collapse: collapse;
        }
        td, th
        {
            border: 1px solid lightgray;
            padding: 3px 7px 2px 7px;
        }
        th
        {
            text-align: left;
            padding-top: 5px;
            padding-bottom: 4px;
            background-color: Gray;
            color: #ffffff;
        }
        td.stderr
        {
            color: Red;
        }
    </style>
</head>
<body>
    <table id="logFilesTable">
        <tr>
            <th>
                Computer name
            </th>
            <th>
                PID
            </th>
            <th>
                Type
            </th>
            <th>
                Created
            </th>
            <th>
                Link
            </th>
        </tr>
    </table>
    <p id="lastUpdated"></p>
    <script type="text/javascript">

        // this is replaced with actual data at runtime by code in interceptor.js
        var logFiles = [{"file":"238749-3692-stderr-1773050218051.txt","computername":"238749","pid":3692,"type":"stderr","created":1773050218051},{"file":"238749-3692-stderr-1773262830129.txt","computername":"238749","pid":3692,"type":"stderr","created":1773262830129},{"file":"238749-3692-stdout-1773254995270.txt","computername":"238749","pid":3692,"type":"stdout","created":1773254995270},{"file":"238749-3692-stdout-1773257518492.txt","computername":"238749","pid":3692,"type":"stdout","created":1773257518492},{"file":"238749-3692-stdout-1773257723470.txt","computername":"238749","pid":3692,"type":"stdout","created":1773257723470},{"file":"238749-3692-stdout-1773261373825.txt","computername":"238749","pid":3692,"type":"stdout","created":1773261373825},{"file":"238749-3692-stdout-1773261792289.txt","computername":"238749","pid":3692,"type":"stdout","created":1773261792289},{"file":"238749-3692-stdout-1773262212506.txt","computername":"238749","pid":3692,"type":"stdout","created":1773262212506},{"file":"238749-3692-stdout-1773262638584.txt","computername":"238749","pid":3692,"type":"stdout","created":1773262638584},{"file":"238749-7464-stderr-1773262948877.txt","computername":"238749","pid":7464,"type":"stderr","created":1773262948877},{"file":"238749-7464-stdout-1773262943204.txt","computername":"238749","pid":7464,"type":"stdout","created":1773262943204},{"file":"238749-7516-stderr-1773263002381.txt","computername":"238749","pid":7516,"type":"stderr","created":1773263002381},{"file":"238749-7516-stdout-1773263000480.txt","computername":"238749","pid":7516,"type":"stdout","created":1773263000480},{"file":"238749-8020-stderr-1773263654024.txt","computername":"238749","pid":8020,"type":"stderr","created":1773263654024},{"file":"238749-8020-stdout-1773263652013.txt","computername":"238749","pid":8020,"type":"stdout","created":1773263652013}];
        var lastUpdated = 1773263654304;
        var date = new Date();

        date.setTime(lastUpdated);
        document.getElementById('lastUpdated').innerHTML = 'Index was last updated ' + date;

        logFiles.sort(function (a, b) {
            return b.created - a.created;
        });

        var logFilesTable = document.getElementById("logFilesTable");
        for (var i = 0; i < logFiles.length; i++) {
            var logFile = logFiles[i];
            date.setTime(logFile.created);
            var row = logFilesTable.insertRow(-1);
            var computerNameCell = row.insertCell(0);
            var pidCell = row.insertCell(1);
            var typeCell = row.insertCell(2);
            var dateCell = row.insertCell(3);
            var logCell = row.insertCell(4);
            computerNameCell.innerHTML = logFile.computername;
            pidCell.innerHTML = logFile.pid.toString();
            typeCell.innerHTML = logFile.type;
            typeCell.setAttribute('class', logFile.type);
            dateCell.innerHTML = date.toString();
            logCell.innerHTML = '<a href="' + logFile.file + '">log</a>';
        };

    </script>
</body>
</html>
